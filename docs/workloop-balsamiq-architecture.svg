<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1400" viewBox="0 0 1600 1400" role="img" aria-labelledby="title desc">
  <title id="title">workloop 仓库架构图（Balsamiq 手绘风格）</title>
  <desc id="desc">展示 Agent 宿主、portable skills、CLI 与 hooks、application 装配层、核心叶子模块、任务状态与持久化之间的关系。</desc>
  <defs>
    <filter id="rough" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="2" seed="9" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="paper" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.45" numOctaves="3" seed="4" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0" result="gray"/>
      <feComponentTransfer in="gray" result="faint"><feFuncA type="table" tableValues="0 0.035"/></feComponentTransfer>
      <feBlend in="SourceGraphic" in2="faint" mode="multiply"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
    <style>
      .box { fill:#fff; stroke:#333; stroke-width:2.4; rx:10; filter:url(#rough); }
      .yellow { fill:#fff6bf; }
      .blue { fill:#dceeff; }
      .green { fill:#dff3dc; }
      .pink { fill:#f7dce5; }
      .gray { fill:#efefef; }
      .ink { fill:#292929; font-family:"Chalkboard SE","Comic Sans MS","PingFang SC",sans-serif; }
      .title { font-size:34px; font-weight:700; }
      .h1 { font-size:23px; font-weight:700; }
      .h2 { font-size:19px; font-weight:700; }
      .body { font-size:16px; }
      .small { font-size:14px; }
      .mono { font-family:"SFMono-Regular",Consolas,monospace; font-size:14px; }
      .line { fill:none; stroke:#333; stroke-width:2.4; marker-end:url(#arrow); filter:url(#rough); }
      .dash { fill:none; stroke:#555; stroke-width:2; stroke-dasharray:8 7; marker-end:url(#arrow); }
      .note { fill:#fff9d7; stroke:#777; stroke-width:1.7; filter:url(#rough); }
    </style>
  </defs>

  <rect width="1600" height="1400" fill="#faf9f5" filter="url(#paper)"/>
  <text x="60" y="58" class="ink title">workloop — 工作循环内核 / Runtime Stop Gate</text>
  <text x="62" y="88" class="ink body">依赖为零的 Node.js CLI；约束写入，执行新鲜判据，裁决任务是否具备关闭资格</text>

  <!-- External host -->
  <rect x="55" y="130" width="230" height="185" class="box yellow"/>
  <text x="78" y="166" class="ink h1">Agent / Host</text>
  <text x="78" y="199" class="ink body">Claude / Codex / CLI</text>
  <text x="78" y="229" class="ink body">• 发起任务与工具调用</text>
  <text x="78" y="257" class="ink body">• 读取状态与下一步</text>
  <text x="78" y="285" class="ink body">• 调度器留在仓库外</text>

  <!-- Skills -->
  <rect x="345" y="120" width="310" height="205" class="box green"/>
  <text x="370" y="158" class="ink h1">Portable Skills</text>
  <text x="370" y="190" class="ink h2">skills/loop-core</text>
  <text x="390" y="212" class="ink small">共享 task / envelope / criterion 语义</text>
  <text x="370" y="239" class="ink h2">skills/workloop</text>
  <text x="390" y="261" class="ink small">机器可验证工作闭环</text>
  <text x="370" y="286" class="ink h2">judgmentloop + meta-loop</text>
  <text x="390" y="308" class="ink small">人工判据闭环 + ledger 元反馈</text>

  <!-- Entry adapters -->
  <rect x="720" y="120" width="355" height="205" class="box blue"/>
  <text x="745" y="158" class="ink h1">入口与宿主适配</text>
  <text x="745" y="197" class="ink h2">bin/workloop.mjs</text>
  <text x="765" y="222" class="ink body">薄进程入口 → main()</text>
  <text x="745" y="259" class="ink h2">PreToolUse / Stop Hooks</text>
  <text x="765" y="284" class="ink body">写入前置检查 / 停止裁决</text>
  <text x="745" y="309" class="ink small">保持字节级 hook 协议兼容</text>

  <!-- Assembly -->
  <rect x="1140" y="120" width="395" height="205" class="box pink"/>
  <text x="1165" y="158" class="ink h1">单一装配层</text>
  <text x="1165" y="198" class="ink h2">lib/application.mjs</text>
  <text x="1185" y="229" class="ink body">• 解析 open / verify / achieve ...</text>
  <text x="1185" y="258" class="ink body">• 编排叶子模块与 hook 输出</text>
  <text x="1185" y="287" class="ink body">• 提交事件，刷新 snapshot / projection</text>

  <path d="M285 215 C315 215 315 215 345 215" class="line"/>
  <path d="M655 215 C685 215 690 215 720 215" class="line"/>
  <path d="M1075 215 C1100 215 1115 215 1140 215" class="line"/>

  <!-- Leaf module zone -->
  <path d="M1335 325 L1335 365 L800 365 L800 395" class="line"/>
  <rect x="250" y="385" width="1285" height="360" rx="18" fill="none" stroke="#777" stroke-width="2" stroke-dasharray="10 8"/>
  <text x="275" y="420" class="ink h1">核心叶子模块（只能依赖 prims；彼此不横向导入）</text>

  <rect x="280" y="450" width="280" height="125" class="box pink"/>
  <text x="302" y="485" class="ink h2">task-engine.mjs</text>
  <text x="302" y="514" class="ink body">生命周期状态机</text>
  <text x="302" y="540" class="ink body">policy / budget / proof / review</text>

  <rect x="590" y="450" width="280" height="125" class="box blue"/>
  <text x="612" y="485" class="ink h2">criterion.mjs</text>
  <text x="612" y="514" class="ink body">执行 command / file 判据</text>
  <text x="612" y="540" class="ink body">副作用检测 + drift</text>

  <rect x="900" y="450" width="280" height="125" class="box yellow"/>
  <text x="922" y="485" class="ink h2">supervision.mjs</text>
  <text x="922" y="514" class="ink body">envelope / session ownership</text>
  <text x="922" y="540" class="ink body">命令安全 + host approval key</text>

  <rect x="1210" y="450" width="280" height="125" class="box green"/>
  <text x="1232" y="485" class="ink h2">task-store.mjs</text>
  <text x="1232" y="514" class="ink body">digest snapshot + task lock</text>
  <text x="1232" y="540" class="ink body">快照可删除并从事件重建</text>

  <rect x="280" y="610" width="280" height="105" class="box gray"/>
  <text x="302" y="645" class="ink h2">event-store.mjs</text>
  <text x="302" y="675" class="ink body">events-v3.jsonl 唯一权威</text>
  <text x="302" y="698" class="ink small">hash chain + torn-tail recovery</text>

  <rect x="590" y="610" width="280" height="105" class="box gray"/>
  <text x="612" y="645" class="ink h2">outcome-projector.mjs</text>
  <text x="612" y="675" class="ink body">投影 outcomes-v3.jsonl</text>
  <text x="612" y="698" class="ink small">HOME：degrade open</text>

  <rect x="900" y="610" width="280" height="105" class="box gray"/>
  <text x="922" y="645" class="ink h2">evidence-ledger.mjs</text>
  <text x="922" y="675" class="ink body">PreToolUse / Stop 证据</text>
  <text x="922" y="698" class="ink small">untracked nudges；coverage 三态</text>

  <rect x="1210" y="610" width="280" height="105" class="box gray"/>
  <text x="1232" y="645" class="ink h2">prims.mjs</text>
  <text x="1232" y="675" class="ink body">常量与纯工具函数</text>
  <text x="1232" y="698" class="ink small">所有叶子模块的唯一内部依赖</text>

  <path d="M420 575 L420 594 L1265 594 L1265 610" class="dash"/>
  <path d="M730 575 L730 594 L1265 594 L1265 610" class="dash"/>
  <path d="M1040 575 L1040 594 L1265 594 L1265 610" class="dash"/>
  <path d="M1350 575 L1350 610" class="dash"/>

  <!-- Lifecycle -->
  <rect x="55" y="795" width="975" height="265" class="box"/>
  <text x="80" y="835" class="ink h1">任务生命周期与判据（两者分离）</text>
  <rect x="90" y="875" width="190" height="70" class="box blue"/>
  <text x="153" y="917" class="ink h2">active</text>
  <rect x="400" y="875" width="220" height="70" class="box yellow"/>
  <text x="428" y="907" class="ink h2">suspended</text>
  <text x="428" y="930" class="ink small">reason: stuck / budget / input</text>
  <rect x="740" y="875" width="250" height="70" class="box green"/>
  <text x="770" y="907" class="ink h2">terminal</text>
  <text x="770" y="930" class="ink small">achieved / not_needed / abandoned</text>
  <path d="M280 910 L400 910" class="line"/>
  <text x="310" y="893" class="ink small">suspend</text>
  <path d="M400 955 C350 995 270 985 215 945" class="line"/>
  <text x="300" y="1003" class="ink small">resume / join ownership</text>
  <path d="M280 910 C500 820 640 820 740 900" class="line"/>
  <text x="475" y="846" class="ink small">关闭资格满足后显式/自动终结</text>
  <text x="92" y="1030" class="ink body">criterion: unsatisfied / satisfied / indeterminate</text>
  <text x="530" y="1030" class="ink body">closure: not_ready / held / eligible</text>

  <!-- Packaging and tests -->
  <rect x="1080" y="795" width="455" height="265" class="box gray"/>
  <text x="1105" y="835" class="ink h1">发布与验证边界</text>
  <text x="1105" y="874" class="ink h2">install.mjs</text>
  <text x="1125" y="901" class="ink body">runtime + shim + 4 managed skills</text>
  <text x="1125" y="927" class="ink body">digest 校验；保护本地接管内容</text>
  <text x="1105" y="969" class="ink h2">tests/</text>
  <text x="1125" y="996" class="ink body">行为 / 架构 / hook 协议 / 安装 / 技能闭包</text>
  <text x="1125" y="1026" class="ink mono">npm test</text>

  <!-- Loop engineering positioning -->
  <rect x="55" y="1100" width="1480" height="250" class="box blue"/>
  <text x="80" y="1138" class="ink h1">当前仓库定义的 Loop Engineering 组合闭环</text>
  <text x="80" y="1166" class="ink body">依据当前 README、loop-core 与 HOSTS：外部负责续轮；四个 kernel skills 组织任务、判断与元反馈；runtime 约束写入并裁决结果</text>

  <rect x="90" y="1200" width="235" height="90" class="box gray"/>
  <text x="112" y="1234" class="ink h2">① External Driver</text>
  <text x="112" y="1260" class="ink small">人 / recurring goal / scheduler</text>
  <text x="112" y="1281" class="ink small">触发下一回合；不随本仓库发布</text>

  <rect x="375" y="1200" width="235" height="90" class="box pink"/>
  <text x="397" y="1234" class="ink h2">② Host Binding</text>
  <text x="397" y="1260" class="ink small">session identity · hooks</text>
  <text x="397" y="1281" class="ink small">承接 Stop / PreToolUse 反馈</text>

  <rect x="660" y="1200" width="235" height="90" class="box yellow"/>
  <text x="682" y="1234" class="ink h2">③ Kernel Skills</text>
  <text x="682" y="1260" class="ink small">workloop / judgmentloop</text>
  <text x="682" y="1281" class="ink small">meta-loop 读取 ledger 反馈</text>

  <rect x="945" y="1200" width="235" height="90" class="box green"/>
  <text x="967" y="1234" class="ink h2">④ Runtime Gate</text>
  <text x="967" y="1260" class="ink small">envelope · budget · criterion</text>
  <text x="967" y="1281" class="ink small">约束写入并现场裁决 Stop</text>

  <rect x="1230" y="1200" width="235" height="90" class="box blue"/>
  <text x="1252" y="1234" class="ink h2">⑤ Project Work</text>
  <text x="1252" y="1260" class="ink small">最小改动 · focused checks</text>
  <text x="1252" y="1281" class="ink small">产出 evidence / ledger / outcome</text>

  <path d="M325 1245 L375 1245" class="line"/>
  <path d="M610 1245 L660 1245" class="line"/>
  <path d="M895 1245 L945 1245" class="line"/>
  <path d="M1180 1245 L1230 1245" class="line"/>
  <path d="M1348 1292 C1348 1335 200 1340 200 1292" class="dash"/>
  <text x="520" y="1333" class="ink small">Stop/status 的判据、挂起、终态与下一步反馈 → 外部 Driver 决定结束或触发下一轮</text>
  <path d="M650 1187 H1195" fill="none" stroke="#cc3654" stroke-width="3" filter="url(#rough)"/>
  <path d="M650 1180 V1195 M1195 1180 V1195" fill="none" stroke="#cc3654" stroke-width="3"/>
  <text x="750" y="1184" class="ink small">本仓库发布边界：runtime + four kernel skills</text>
  <text x="1220" y="1184" class="ink small">drivers / schedulers：仓库外组合</text>

  <!-- Sticky note -->
  <path d="M65 350 H215 L235 370 V445 H65 Z" class="note"/>
  <path d="M215 350 V370 H235" fill="none" stroke="#777" stroke-width="1.7"/>
  <text x="82" y="383" class="ink h2">关键边界</text>
  <text x="82" y="411" class="ink small">Runtime = stop gate</text>
  <text x="82" y="434" class="ink small">Scheduler = repo 外部</text>
</svg>
