<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" role="img" aria-labelledby="title desc">
  <title id="title">workloop 的 Loop Engineering 双层反馈环</title>
  <desc id="desc">以内层任务执行闭环和外层循环工程改进闭环说明当前 workloop 仓库的定位。</desc>
  <defs>
    <filter id="rough" x="-4%" y="-4%" width="108%" height="108%">
      <feTurbulence type="fractalNoise" baseFrequency="0.011" numOctaves="2" seed="12" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.7"/>
    </filter>
    <filter id="paper"><feTurbulence type="fractalNoise" baseFrequency="0.38" numOctaves="3" seed="5" result="n"/><feComponentTransfer in="n"><feFuncA type="table" tableValues="0 .035"/></feComponentTransfer><feBlend in="SourceGraphic" mode="multiply"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="#303030"/></marker>
    <marker id="redarrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="#bd3c57"/></marker>
    <style>
      .ink{fill:#282828;font-family:"Chalkboard SE","Comic Sans MS","PingFang SC",sans-serif}.title{font-size:34px;font-weight:700}.h1{font-size:23px;font-weight:700}.h2{font-size:18px;font-weight:700}.body{font-size:16px}.small{font-size:14px}.mono{font:14px "SFMono-Regular",Consolas,monospace}.box{fill:#fff;stroke:#333;stroke-width:2.4;rx:12;filter:url(#rough)}.blue{fill:#ddecff}.green{fill:#e1f2db}.yellow{fill:#fff4b8}.pink{fill:#f7dce5}.gray{fill:#efefef}.line{fill:none;stroke:#333;stroke-width:2.5;marker-end:url(#arrow);filter:url(#rough)}.feedback{fill:none;stroke:#bd3c57;stroke-width:3;stroke-dasharray:10 7;marker-end:url(#redarrow);filter:url(#rough)}.rail{fill:none;stroke:#596775;stroke-width:4;stroke-dasharray:12 8;filter:url(#rough)}
    </style>
  </defs>
  <rect width="1600" height="1200" fill="#fbfaf6" filter="url(#paper)"/>
  <text x="55" y="58" class="ink title">workloop × Loop Engineering</text>
  <text x="57" y="88" class="ink body">不是“一次执行脚本”，而是：把任务环机器化，再用可审计反馈持续工程化这个环</text>

  <!-- Outer loop -->
  <rect x="45" y="115" width="1510" height="1025" rx="28" fill="none" stroke="#bd3c57" stroke-width="3" stroke-dasharray="13 9" filter="url(#rough)"/>
  <text x="75" y="153" class="ink h1">外环：Engineer the Loop（人、meta-loop 或外部 driver 驱动）</text>

  <rect x="75" y="185" width="310" height="165" class="box yellow"/>
  <text x="98" y="222" class="ink h1">1. 设计可运行契约</text>
  <text x="98" y="254" class="ink body">goal + executable criterion</text>
  <text x="98" y="280" class="ink body">alignment + not-covered</text>
  <text x="98" y="306" class="ink body">envelope + budgets + risk</text>
  <text x="98" y="332" class="ink small">不是“做完了吗？”而是“机器如何知道？”</text>

  <rect x="1190" y="185" width="320" height="165" class="box green"/>
  <text x="1213" y="222" class="ink h1">4. 改进循环系统</text>
  <text x="1213" y="254" class="ink body">调整 criterion / policy</text>
  <text x="1213" y="280" class="ink body">改进 skill / host binding</text>
  <text x="1213" y="306" class="ink body">加固 runtime / tests</text>
  <text x="1213" y="332" class="ink small">改的是环，不是替本轮伪造成功</text>

  <rect x="1190" y="865" width="320" height="185" class="box blue"/>
  <text x="1213" y="902" class="ink h1">3. 收集工程反馈</text>
  <text x="1213" y="934" class="ink body">ledger --json：coverage / authority use</text>
  <text x="1213" y="960" class="ink body">events-v3 authority + outcomes-v3 projection</text>
  <text x="1213" y="986" class="ink body">terminal / suspended / abandoned</text>
  <text x="1213" y="1018" class="ink small">失败、挂起、预算耗尽都进入反馈样本</text>

  <path d="M385 270 C700 115 960 115 1190 260" class="feedback"/>
  <text x="665" y="153" class="ink small">新版本契约进入下一次任务</text>
  <path d="M1350 350 L1350 865" class="feedback"/>
  <text x="1370" y="620" class="ink small">验证改变是否有效</text>
  <path d="M1190 1030 C760 1145 220 1060 225 350" class="feedback"/>
  <text x="410" y="1090" class="ink small">从 outcome、失败模式和审计证据回到设计；该反馈不由 runtime 自动修改代码</text>

  <!-- Driver -->
  <rect x="75" y="440" width="230" height="150" class="box gray"/>
  <text x="98" y="478" class="ink h1">External Driver</text>
  <text x="98" y="510" class="ink body">人 / goal / scheduler</text>
  <text x="98" y="538" class="ink body">只负责“再来一轮”</text>
  <text x="98" y="566" class="ink small">terminal 或 suspend 时应停</text>
  <path d="M305 515 L390 515" class="line"/>
  <text x="318" y="498" class="ink small">next round</text>

  <!-- Runtime rail surrounding inner loop -->
  <rect x="375" y="380" width="755" height="605" rx="32" class="rail"/>
  <text x="405" y="418" class="ink h1">2. 内环：Run One Durable Task</text>
  <text x="405" y="444" class="ink small">workloop / judgmentloop 组织行为；runtime 作为四周护栏持续监督，而非流程中的单一步骤</text>

  <rect x="425" y="475" width="250" height="105" class="box yellow"/>
  <text x="447" y="510" class="ink h2">SOURCE + OPEN</text>
  <text x="447" y="538" class="ink body">建立 criterion generation</text>
  <text x="447" y="562" class="ink small">default 策略先见证 unsatisfied</text>

  <rect x="805" y="475" width="250" height="105" class="box pink"/>
  <text x="827" y="510" class="ink h2">ACT</text>
  <text x="827" y="538" class="ink body">最小、对齐的修改</text>
  <text x="827" y="562" class="ink small">PreToolUse 检查每次写入</text>

  <rect x="805" y="650" width="250" height="110" class="box blue"/>
  <text x="827" y="685" class="ink h2">VERIFY + REVIEW</text>
  <text x="827" y="713" class="ink body">focused check / proof assurance</text>
  <text x="827" y="738" class="ink small">风险需要时接受独立 review</text>

  <rect x="425" y="650" width="250" height="110" class="box green"/>
  <text x="447" y="685" class="ink h2">STOP GATE</text>
  <text x="447" y="713" class="ink body">现场重跑 fresh criterion</text>
  <text x="447" y="738" class="ink small">投影 closure：not_ready / held / eligible</text>

  <path d="M675 527 L805 527" class="line"/>
  <path d="M930 580 L930 650" class="line"/>
  <path d="M805 705 L675 705" class="line"/>
  <path d="M550 650 L550 580" class="line"/>
  <text x="578" y="616" class="ink small">unsatisfied / held → 下一轮</text>

  <rect x="425" y="825" width="630" height="105" class="box gray"/>
  <text x="447" y="860" class="ink h2">HONEST OUTCOME</text>
  <text x="447" y="890" class="ink body">terminal: achieved / not_needed / abandoned　　suspended: needs_input / stuck / out_of_budget</text>
  <text x="447" y="914" class="ink small">“绿”只是证据；终态、审查接受度和关闭资格分开建模</text>
  <path d="M550 760 L550 825" class="line"/>
  <path d="M1055 878 L1190 940" class="line"/>

  <!-- Runtime rails labels -->
  <rect x="600" y="950" width="310" height="55" class="box blue"/>
  <text x="630" y="985" class="ink h2">Runtime Stop Gate / Safety Rails</text>
  <text x="400" y="1035" class="ink small">持续约束：envelope · authority grants · session ownership · budgets · criterion drift · assurance · task lock</text>

  <!-- Repo mapping -->
  <rect x="75" y="865" width="250" height="185" class="box gray"/>
  <text x="98" y="902" class="ink h1">仓库落点</text>
  <text x="98" y="934" class="ink mono">skills/workloop</text>
  <text x="98" y="956" class="ink mono">skills/loop-core</text>
  <text x="98" y="978" class="ink mono">skills/judgmentloop</text>
  <text x="98" y="1000" class="ink mono">skills/meta-loop</text>
  <text x="98" y="1022" class="ink mono">lib/application.mjs</text>
  <text x="98" y="1044" class="ink mono">tests/*.test.mjs</text>

  <text x="70" y="1170" class="ink body">边界：workloop 交付 runtime 与四个 kernel skills；Driver、OS sandbox、其他 loop skills 在仓库外组合。</text>
</svg>
